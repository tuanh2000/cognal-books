# Production compose for the host (single VPS). Runs pre-built images from GHCR
# — it never builds. The deploy workflow pushes images and runs
# `docker compose -f docker-compose.prod.yml pull && up -d` here.
#
# On the host you need a `.env` next to this file with all secrets/config
# (copy .env.example). IMAGE_BASE/IMAGE_TAG/HTTP_PORT have sensible defaults.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${IMAGE_BASE:-ghcr.io/tuanh2000/cognal-books}-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT:-4000}
      API_JWT_SECRET: ${API_JWT_SECRET}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FREE_DAILY_LIMIT: ${FREE_DAILY_LIMIT:-200}
      TRANSLATION_PROVIDER_ORDER: ${TRANSLATION_PROVIDER_ORDER:-gemini,groq,openrouter,openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
    volumes:
      - uploads_data:${UPLOAD_DIR:-/data/uploads}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${IMAGE_BASE:-ghcr.io/tuanh2000/cognal-books}-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: 'true'
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      API_JWT_SECRET: ${API_JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  uploads_data:
